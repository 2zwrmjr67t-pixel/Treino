<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Treino">
<title>Treino 5x</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0e0c;--s1:#1a1916;--s2:#222120;--br:#2e2d2a;--tx:#e8e4dc;--mt:#8a877f;--ac:#d4a853;--bl:#4a8fa8;--gn:#5a9e72;--rd:#c44b4b;--am:#c97d3a;--pu:#7a6bbf;--pk:#b85c8a;--inf:#4a8fa8;--suc:#5a9e72;--dan:#c44b4b;--war:#c97d3a}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column}

/* NAV PRINCIPAL */
.main-nav{display:flex;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg)}
.main-tab{flex:1;padding:14px 8px;font-size:11px;font-weight:500;color:var(--mt);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.03em;transition:all .2s}
.main-tab.on{color:var(--tx);border-bottom-color:var(--ac)}

/* HEADER */
.hdr{padding:max(48px,env(safe-area-inset-top)) 16px 14px;border-bottom:1px solid var(--br);flex-shrink:0}
.hdr-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mt);margin-bottom:4px}
.hdr-ttl{font-size:22px;font-weight:600;color:var(--tx);line-height:1.1}
.hdr-ttl span{color:var(--ac);font-weight:300;font-style:italic}
.hdr-sub{font-size:11px;color:var(--mt);margin-top:4px}

/* LEGEND */
.lgd{display:flex;gap:10px;padding:8px 16px;border-bottom:1px solid var(--br);flex-shrink:0;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mt)}
.ld{width:5px;height:5px;border-radius:50%}

/* TABS DIAS */
.day-tabs{display:flex;gap:0;border-bottom:1px solid var(--br);flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--bg)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;padding:9px 6px 7px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;color:var(--mt)}
.day-tab.on{color:var(--tx)}
.dtd{font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.dtn{font-size:11px;font-weight:500;margin-top:1px;white-space:nowrap}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view{display:none}.view.on{display:flex;flex-direction:column;height:100%}

/* PANELS */
.panel{display:none;padding:14px 16px 32px}
.panel.on{display:block}

/* BADGES */
.bdg{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:5px}
.ptl{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:2px}
.pfoc{font-size:11px;color:var(--mt);margin-bottom:12px;line-height:1.4}

/* TIMELINE */
.tl{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--br);margin-bottom:14px}
.ts{flex:1;padding:6px 2px;text-align:center;font-size:8px;color:var(--mt);line-height:1.35;border-right:1px solid var(--br)}
.ts:last-child{border-right:none}
.ts.hi{background:var(--s1);color:var(--tx)}
.tm{font-size:7px;color:var(--mt)}

/* EXERCISE CARDS */
.ec{background:var(--s1);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--br);position:relative;overflow:hidden}
.ea{position:absolute;left:0;top:0;bottom:0;width:3px}
.en{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.enm{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:6px}
.etgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.etg{font-size:9px;font-weight:500;padding:1px 6px;border-radius:8px}
.ep{background:rgba(74,143,168,.18);color:#7ec8e3}
.ec2{background:rgba(196,75,75,.18);color:#e07070}
.ef{background:rgba(184,92,138,.18);color:#d47daa}
.ests{display:flex;gap:14px;margin-bottom:8px}
.est{display:flex;flex-direction:column}
.esl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em}
.esv{font-size:17px;font-weight:600;color:var(--tx);line-height:1.2}
.esv.sm{font-size:13px}
.enote{font-size:11px;color:var(--mt);line-height:1.5;padding-top:8px;border-top:1px solid var(--br)}

/* PHASE CARDS (cardio) */
.pc{background:var(--s1);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--br);position:relative;overflow:hidden}
.pa{position:absolute;left:0;top:0;bottom:0;width:3px}
.pn{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pt{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:8px;line-height:1.3}
.psts{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.pst{display:flex;flex-direction:column}
.psl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em}
.psv{font-size:13px;font-weight:500;color:var(--tx);line-height:1.3}
.pnote{font-size:11px;color:var(--mt);line-height:1.5;padding-top:8px;border-top:1px solid var(--br)}

/* META */
.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.mc{background:var(--s2);border-radius:8px;padding:9px 11px}
.ml{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
.mv{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3;margin-top:2px}

/* ZONA BAR */
.hz-bar{border-radius:8px;overflow:hidden;border:1px solid var(--br);margin-bottom:8px}
.hz-row{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--br);font-size:11px;gap:8px}
.hz-row:last-child{border-bottom:none}
.hz-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hz-lbl{color:var(--mt);flex:1;font-size:10px}
.hz-bpm{color:var(--tx);font-weight:500;font-size:11px;white-space:nowrap}

/* INFO BOX */
.ibox{background:var(--s2);border-radius:8px;padding:10px 12px;margin:4px 0 12px;font-size:11px;color:var(--mt);line-height:1.6}
.ibox b{color:var(--tx);font-weight:500}

/* SECTION LABEL */
.slbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);margin:12px 0 8px}

/* PROG CARDS */
.pgc{background:var(--s1);border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid var(--br);font-size:11px;color:var(--mt);line-height:1.6}
.pgc b{color:var(--tx);font-weight:500}

/* FOOTER */
.ftr{background:var(--s1);border-radius:10px;border:1px solid var(--br);padding:12px;font-size:10px;color:var(--mt);line-height:1.7;margin-top:4px}
.ftrtl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);margin-bottom:6px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-lbl">Programa completo</div>
  <div class="hdr-ttl">5x semana &nbsp;<span>45 min</span></div>
  <div class="hdr-sub">Musculação · Condicionamento · Performance</div>
</div>

<div class="main-nav">
  <button class="main-tab on" onclick="switchMain(0,this)">Musculação</button>
  <button class="main-tab" onclick="switchMain(1,this)">Cardio</button>
</div>

<!-- VIEW MUSCULAÇÃO -->
<div class="view on" id="v0">
  <div class="lgd">
    <div class="li"><div class="ld" style="background:#7ec8e3"></div>◆ principal</div>
    <div class="li"><div class="ld" style="background:#e07070"></div>⚠ coluna</div>
    <div class="li"><div class="ld" style="background:#d47daa"></div>⚡ perf</div>
  </div>
  <div class="day-tabs" id="dtabs"></div>
  <div class="scroll"><div id="dpanels"></div></div>
</div>

<!-- VIEW CARDIO -->
<div class="view" id="v1">
  <div class="day-tabs" id="ctabs"></div>
  <div class="scroll"><div id="cpanels"></div></div>
</div>

<script>
function switchMain(idx,el){
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('on')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on')});
  el.classList.add('on');
  document.getElementById('v'+idx).classList.add('on');
}

   foc:"Fechamento semanal — cadeia posterior completa e braços",
   tl:[{t:"Aquec.",m:"4min",h:0},{t:"RDL",m:"14min",h:1},{t:"Flexora",m:"8min",h:1},{t:"Abdução",m:"7min",h:1},{t:"Rosca scott",m:"8min",h:1},{t:"Rosca martelo",m:"6min",h:1}],

var TM={p:['ep','◆ principal'],c:['ec2','⚠ coluna'],f:['ef','⚡ perf']};

function buildMusc(){
  var tabs=document.getElementById('dtabs');
  var panels=document.getElementById('dpanels');
  MUSC.forEach(function(d,i){
    var tb=document.createElement('button');
    tb.className='day-tab'+(i===0?' on':'');
    tb.style.borderBottomColor=i===0?d.c:'transparent';
    tb.style.color=i===0?'var(--tx)':'var(--mt)';
    tb.innerHTML='<span class="dtd">'+d.l+'</span><span class="dtn">'+d.n+'</span>';
    tb.addEventListener('click',function(){
      document.querySelectorAll('#dtabs .day-tab').forEach(function(t){t.classList.remove('on');t.style.borderBottomColor='transparent';t.style.color='var(--mt)'});
      document.querySelectorAll('#dpanels .panel').forEach(function(p){p.classList.remove('on')});
      tb.classList.add('on');tb.style.borderBottomColor=d.c;tb.style.color='var(--tx)';
      document.getElementById('dp'+i).classList.add('on');
      document.querySelector('#v0 .scroll').scrollTop=0;
    });
    tabs.appendChild(tb);

    var pnl=document.createElement('div');
    pnl.className='panel'+(i===0?' on':'');
    pnl.id='dp'+i;

    var tl='<div class="tl">';
    d.tl.forEach(function(s){tl+='<div class="ts'+(s.h?' hi':'')+'">'+s.t+'<div class="tm">'+s.m+'</div></div>';});
    tl+='</div>';

    var ex='';
    d.ex.forEach(function(e,ei){
      var tgs='';
      if(e.tg.length){tgs='<div class="etgs">';e.tg.forEach(function(t){var m=TM[t];tgs+='<span class="etg '+m[0]+'">'+m[1]+'</span>';});tgs+='</div>';}
      ex+='<div class="ec"><div class="ea" style="background:'+d.c+'"></div>'
        +'<div class="en">Exercício '+(ei+1)+' / '+d.ex.length+'</div>'
        +'<div class="enm">'+e.n+'</div>'+tgs
        +'<div class="ests"><div class="est"><span class="esl">Séries</span><span class="esv">'+e.s+'</span></div>'
        +'<div class="est"><span class="esl">Reps</span><span class="esv sm">'+e.r+'</span></div>'
        +'<div class="est"><span class="esl">Descanso</span><span class="esv">'+e.d+'</span></div></div>'
        +'<div class="enote">'+e.nt+'</div></div>';
    });

    pnl.innerHTML='<span class="bdg" style="background:'+d.c+'22;color:'+d.c+'">'+d.n+'</span>'
      +'<div class="ptl">'+d.n+'</div><div class="pfoc">'+d.foc+'</div>'
      +tl+ex
      +'<div class="ibox"><b>Nota:</b> '+d.info+'</div>'
      +'<div class="ftr"><div class="ftrtl">Diretrizes gerais</div>'
      +'Aquecimento: 3–4 min + 1 série leve (50%) no composto principal.<br>'
      +'Progressão: sobe a carga quando completar todas as reps com técnica limpa por 2 sessões seguidas.<br>'
      +'Coluna: lordose neutra sempre — especialmente no RDL e remada.<br>'
      +'Sem exercícios unilaterais — todos os movimentos são bilaterais ou em máquina.</div>';
    panels.appendChild(pnl);
  });
}

function buildCard(){
  var tabs=document.getElementById('ctabs');
  var panels=document.getElementById('cpanels');

  // Zonas + Progressão header
  var header=document.createElement('div');
  header.style.padding='14px 16px 0';
  header.innerHTML='<div class="ibox" style="margin-top:0"><b>Protocolo:</b> Anexado ao final do treino de Qua, Qui e Sex. Bike ergométrica ou elíptico. 10–12 minutos por sessão.</div>'
    +'<div class="slbl">Zonas de frequência cardíaca</div>'
    +'<div class="hz-bar">'
    +'<div class="hz-row"><div class="hz-dot" style="background:#5a9e72"></div><span class="hz-lbl">Zona 2 — base aeróbica</span><span class="hz-bpm">60–70% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#c97d3a"></div><span class="hz-lbl">Zona 3 — limiar aeróbico</span><span class="hz-bpm">70–80% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#c44b4b"></div><span class="hz-lbl">Zona 4 — limiar anaeróbico</span><span class="hz-bpm">80–90% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#7a6bbf"></div><span class="hz-lbl">Zona 5 — pico máximo</span><span class="hz-bpm">90–100% FCmax</span></div>'
    +'</div>'
    +'<div style="font-size:10px;color:var(--mt);margin-bottom:10px">FCmax estimada = 220 − sua idade.</div>'
    +'<div class="slbl">Progressão semanal</div>'
    +'<div class="pgc"><b>Semanas 1–2:</b> Execute exatamente como descrito. Aprenda o ritmo dos intervalos e respeite as zonas.</div>'
    +'<div class="pgc"><b>Semanas 3–4:</b> Aumente a resistência da bike/elíptico 1 nível nos blocos de esforço. Mantenha os tempos.</div>'
    +'<div class="pgc"><b>Semanas 5–6:</b> Adicione 1 repetição extra nos intervalos de cada sessão.</div>'
    +'<div class="pgc"><b>Semana 7+:</b> Se a recuperação já acontece abaixo de 130bpm, aumente a intensidade dos picos.</div>';
  panels.appendChild(header);

  CARD.forEach(function(d,i){
    var tb=document.createElement('button');
    tb.className='day-tab'+(i===0?' on':'');
    tb.style.borderBottomColor=i===0?d.c:'transparent';
    tb.style.color=i===0?'var(--tx)':'var(--mt)';
    tb.innerHTML='<span class="dtd">'+d.l+'</span><span class="dtn">'+d.n+'</span>';
    tb.addEventListener('click',function(){
      document.querySelectorAll('#ctabs .day-tab').forEach(function(t){t.classList.remove('on');t.style.borderBottomColor='transparent';t.style.color='var(--mt)'});
      document.querySelectorAll('#cpanels .panel').forEach(function(p){p.classList.remove('on')});
      tb.classList.add('on');tb.style.borderBottomColor=d.c;tb.style.color='var(--tx)';
      document.getElementById('cp'+i).classList.add('on');
      document.querySelector('#v1 .scroll').scrollTop=0;
    });
    tabs.appendChild(tb);

    var pnl=document.createElement('div');
    pnl.className='panel'+(i===0?' on':'');
    pnl.id='cp'+i;

    var meta='<div class="meta">'
      +'<div class="mc"><div class="ml">Duração</div><div class="mv">'+d.dur+'</div></div>'
      +'<div class="mc"><div class="ml">Equipamento</div><div class="mv">'+d.equip+'</div></div>'
      +'</div>'
      +'<div class="ibox"><b>Objetivo:</b> '+d.obj+'</div>';

    var phases='<div class="slbl">Estrutura da sessão</div>';
    d.phases.forEach(function(p,pi){
      phases+='<div class="pc"><div class="pa" style="background:'+p.c+'"></div>'
        +'<div class="pn">'+p.n+'</div><div class="pt">'+p.t+'</div>'
        +'<div class="psts">'
        +'<div class="pst"><span class="psl">Duração</span><span class="psv">'+p.dur+'</span></div>'
        +'<div class="pst"><span class="psl">Zona</span><span class="psv">'+p.zona+'</span></div>'
        +'<div class="pst"><span class="psl">Intensidade</span><span class="psv">'+p.int+'</span></div>'
        +'</div>'
        +'<div class="pnote">'+p.note+'</div></div>';
    });

    pnl.innerHTML='<span class="bdg" style="background:'+d.c+'22;color:'+d.c+'">'+d.badge+'</span>'
      +'<div class="ptl">'+d.n+'</div><div class="pfoc">'+d.foc+'</div>'
      +meta+phases
      +'<div class="ibox"><b>Nota:</b> '+d.info+'</div>';
    panels.appendChild(pnl);
  });
}

buildMusc();
buildCard();
</script>
</body>
</html>
