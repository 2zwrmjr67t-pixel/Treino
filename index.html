<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Protocolo G">
<link rel="apple-touch-icon" href="icon.png">
<title>Protocolo Guilherme 45'</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0c0a;--s1:#161513;--s2:#1e1c1a;--br:#232220;--br2:#2a2927;
  --tx:#e8e2d8;--mt:#6b6760;--ac:#c9a05a;--ac2:#a07840;
  --bl:#5a8a7a;--rd:#c07070;--pu:#a07aa0;--gn:#6a9a6a;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column;height:100vh}

.hdr{padding:max(48px,env(safe-area-inset-top)) 20px 18px;border-bottom:1px solid var(--br);flex-shrink:0}
.hdr-eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--mt);margin-bottom:8px}
.hdr-title{font-size:28px;font-weight:300;color:var(--tx);line-height:1.05;letter-spacing:-.02em}
.hdr-title strong{font-weight:600;color:var(--ac)}
.hdr-title em{font-style:italic;font-weight:300;color:var(--ac)}
.hdr-sub{font-size:11px;color:var(--mt);margin-top:8px;letter-spacing:.03em;line-height:1.5}
.hdr-divider{width:32px;height:1px;background:var(--ac);opacity:.4;margin:12px 0 0}

.main-nav{display:flex;border-bottom:1px solid var(--br);flex-shrink:0}
.main-tab{flex:1;padding:13px 8px;font-size:10px;font-weight:500;color:var(--mt);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
.main-tab.on{color:var(--ac);border-bottom-color:var(--ac)}

.lgd{display:flex;gap:12px;padding:9px 20px;border-bottom:1px solid var(--br);flex-shrink:0;flex-wrap:wrap;align-items:center}
.lgd-reset{margin-left:auto;font-size:10px;color:var(--mt);background:none;border:none;cursor:pointer;padding:2px 0;letter-spacing:.03em}
.lgd-reset:active{opacity:.5}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mt)}
.ld{width:5px;height:5px;border-radius:50%}

.day-tabs{display:flex;border-bottom:1px solid var(--br);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;padding:9px 6px 7px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;color:var(--mt)}
.day-tab.on{color:var(--tx)}
.dtd{font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.dtn{font-size:11px;font-weight:500;margin-top:1px;white-space:nowrap}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.view{display:none;min-height:0}.view.on{display:flex;flex-direction:column;flex:1;min-height:0}
.panel{display:none;padding:16px 20px 36px}.panel.on{display:block}

.bdg{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:20px;margin-bottom:6px}
.ptl{font-size:19px;font-weight:300;color:var(--tx);letter-spacing:-.01em;margin-bottom:3px}
.pfoc{font-size:11px;color:var(--mt);margin-bottom:14px;line-height:1.4}

.tl{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--br);margin-bottom:14px}
.ts{flex:1;padding:6px 2px;text-align:center;font-size:8px;color:var(--mt);line-height:1.35;border-right:1px solid var(--br)}
.ts:last-child{border-right:none}
.ts.hi{background:var(--s1);color:var(--tx)}
.tm{font-size:7px;color:var(--mt)}

/* EXERCISE CARD */
.ec{background:var(--s1);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--br);position:relative;overflow:hidden;transition:opacity .2s}
.ec.done{opacity:.5}
.ea{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0}
.ec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ec-body{flex:1;min-width:0}
.en{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.enm{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:6px}
.etgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.etg{font-size:9px;font-weight:500;padding:2px 7px;border-radius:8px}
.ep{background:rgba(201,160,90,.12);color:#c9a05a}
.ec2{background:rgba(192,112,112,.12);color:#c07070}
.ef{background:rgba(160,122,160,.12);color:#a07aa0}
.ests{display:flex;gap:16px;margin-bottom:8px}
.est{display:flex;flex-direction:column}
.esl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
.esv{font-size:17px;font-weight:500;color:var(--tx);line-height:1.2}
.esv.sm{font-size:13px}
.enote{font-size:11px;color:var(--mt);line-height:1.5;padding-top:8px;border-top:1px solid var(--br);margin-bottom:8px}

/* CHECK BUTTON */
.chk-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--br2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:2px}
.chk-btn.on{background:var(--ac);border-color:var(--ac)}
.chk-btn svg{width:14px;height:14px;stroke:#0d0c0a;stroke-width:2.5;fill:none;opacity:0;transition:opacity .2s}
.chk-btn.on svg{opacity:1}

/* REGISTRO DE CARGA */
.reg{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--br)}
.reg-last{font-size:11px;color:var(--mt)}
.reg-last b{color:var(--tx);font-weight:500}
.reg-right{display:flex;align-items:center;gap:5px}
.reg-inp{width:52px;padding:4px 6px;font-size:13px;font-weight:500;border-radius:6px;border:1px solid var(--br2);background:var(--s2);color:var(--tx);text-align:center;-webkit-appearance:none}
.reg-inp:focus{outline:none;border-color:var(--ac)}
.reg-unit{font-size:11px;color:var(--mt)}
.reg-btn{font-size:11px;color:var(--ac);background:none;border:none;cursor:pointer;padding:4px 6px;font-weight:500}
.reg-btn:active{opacity:.6}

/* CARDIO */
.pc{background:var(--s1);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--br);position:relative;overflow:hidden}
.pa{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0}
.pn{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.pt{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:8px;line-height:1.3}
.psts{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.pst{display:flex;flex-direction:column}
.psl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em}
.psv{font-size:12px;font-weight:500;color:var(--tx);line-height:1.3}
.pnote{font-size:11px;color:var(--mt);line-height:1.5;padding-top:8px;border-top:1px solid var(--br)}

.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.mc{background:var(--s2);border-radius:8px;padding:10px 12px}
.ml{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
.mv{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3;margin-top:2px}

.hz-bar{border-radius:8px;overflow:hidden;border:1px solid var(--br);margin-bottom:8px}
.hz-row{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--br);gap:8px}
.hz-row:last-child{border-bottom:none}
.hz-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hz-lbl{color:var(--mt);flex:1;font-size:10px}
.hz-bpm{color:var(--tx);font-weight:500;font-size:11px;white-space:nowrap}

.ibox{background:var(--s2);border-radius:8px;padding:10px 12px;margin:4px 0 12px;font-size:11px;color:var(--mt);line-height:1.6}
.ibox b{color:var(--tx);font-weight:500}
.slbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--mt);margin:12px 0 8px}
.pgc{background:var(--s1);border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid var(--br);font-size:11px;color:var(--mt);line-height:1.6}
.pgc b{color:var(--tx);font-weight:500}
.ftr{background:var(--s1);border-radius:10px;border:1px solid var(--br);padding:13px 14px;font-size:10px;color:var(--mt);line-height:1.7;margin-top:6px}
.ftrtl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--mt);margin-bottom:7px}
.ftr-divider{width:20px;height:1px;background:var(--ac);opacity:.3;margin-bottom:10px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-eyebrow">Programa de treino</div>
  <div class="hdr-title">Protocolo <strong>Guilherme</strong><br><em>45'</em></div>
  <div class="hdr-sub">Musculação · Condicionamento · Performance</div>
  <div class="hdr-divider"></div>
</div>

<div class="main-nav">
  <button class="main-tab on" onclick="switchMain(0,this)">Musculação</button>
  <button class="main-tab" onclick="switchMain(1,this)">Cardio</button>
</div>

<div class="view on" id="v0">
  <div class="lgd">
    <div class="li"><div class="ld" style="background:var(--ac)"></div>◆ principal</div>
    <div class="li"><div class="ld" style="background:var(--rd)"></div>⚠ coluna</div>
    <div class="li"><div class="ld" style="background:var(--pu)"></div>⚡ perf</div>
    <button class="lgd-reset" onclick="resetChecks()">↺ reset</button>
  </div>
  <div style="padding:8px 20px;border-bottom:1px solid var(--br);font-size:10px;color:var(--mt);line-height:1.5;background:var(--s1)"><b style="color:var(--ac)">Versão de proteção</b> · ajustes conservadores de coluna aplicados em 09/06/2026, enquanto o quadro está em avaliação. Direcionamentos definitivos após a consulta.</div>
  <div class="day-tabs" id="dtabs"></div>
  <div class="scroll"><div id="dpanels"></div></div>
</div>

<div class="view" id="v1">
  <div class="day-tabs" id="ctabs"></div>
  <div class="scroll"><div id="cpanels"></div></div>
</div>

<script>
function switchMain(idx,el){
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('on')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on')});
  el.classList.add('on');
  document.getElementById('v'+idx).classList.add('on');
}

var MUSC=[
  {l:"Seg",n:"Peito",c:"#c9a05a",
   foc:"Volume horizontal — peitoral e tríceps com 5 exercícios",
   tl:[{t:"Aquec.",m:"3min",h:0},{t:"Supino incl.",m:"13min",h:1},{t:"Supino máq.",m:"11min",h:1},{t:"Crossover",m:"9min",h:1},{t:"Tríceps corda",m:"7min",h:1},{t:"Tríceps testa",m:"7min",h:1}],
   ex:[
     {n:"Supino inclinado com halteres",tg:["p"],s:"4",r:"8–10",d:"90s",nt:"Escápulas retraídas e fixas. Composto principal — priorize a carga aqui."},
     {n:"Supino reto na máquina",tg:[],s:"3",r:"10–12",d:"75s",nt:"Estabilidade escapular garantida — foco total na contração do peitoral."},
     {n:"Crossover cabo alto",tg:[],s:"3",r:"12–15",d:"60s",nt:"Peitoral inferior — expire na contração, pausa de 1s no pico."},
     {n:"Tríceps corda no cabo",tg:[],s:"3",r:"12",d:"60s",nt:"Cotovelos fixos ao lado do corpo. Extensão total na descida."},
     {n:"Tríceps testa EZ-bar",tg:[],s:"3",r:"10–12",d:"60s",nt:"Úmero perpendicular ao chão — não deixe cair para trás."}
   ],
   info:"16 séries totais. Peitoral recebe 10 séries diretas. Tríceps fecha com 6 séries de qualidade."},
  {l:"Ter",n:"Pernas",c:"#7a6bbf",
   foc:"Base hormonal da semana — maior impacto em TRT e performance",
   tl:[{t:"Aquec.",m:"4min",h:0},{t:"Leg press",m:"13min",h:1},{t:"Hip thrust",m:"12min",h:1},{t:"Extensora",m:"8min",h:1},{t:"Flexora",m:"7min",h:1},{t:"Panturrilha",m:"6min",h:1}],
   ex:[
     {n:"Leg press 45°",tg:["p","c"],s:"4",r:"10–12",d:"90s",nt:"Lombar colada ao banco. Conserve a amplitude — não desça ao ponto de a bacia arredondar (sem flexão lombar carregada). Cautela reforçada até esclarecer o D11-D12."},
     {n:"Hip thrust com barra",tg:["f","c"],s:"4",r:"12",d:"90s",nt:"Glúteo máximo — força pélvica. Queixo levemente recolhido e pescoço neutro sob carga: não projete a cabeça nem olhe para cima. Coluna apoiada no banco."},
     {n:"Extensora",tg:[],s:"3",r:"12–15",d:"60s",nt:"Quadríceps isolado — sem carga axial na coluna. Pausa de 1s no topo."},
     {n:"Flexora deitada bilateral",tg:[],s:"3",r:"12–15",d:"60s",nt:"Cadeia posterior — bilateral, sem assimetria. Complementa o hip thrust."},
     {n:"Panturrilha sentada na máquina",tg:[],s:"4",r:"20",d:"45s",nt:"Trocada da versão em pé para tirar a carga axial das ombreiras sobre a coluna. Amplitude total — pausa de 1s no alongamento."}
   ],
   info:"Dia mais importante. Leg press + hip thrust estimulam testosterona endógena — potencializam a TRT."},
  {l:"Qui",n:"Ombros",c:"#6a9a6a",
   foc:"Ombros 3D completos + protocolo de core para performance",
   tl:[{t:"Aquec.",m:"3min",h:0},{t:"Elev. frontal",m:"11min",h:1},{t:"Elev. lateral",m:"9min",h:1},{t:"Face pull",m:"8min",h:1},{t:"Rem. alta",m:"7min",h:1},{t:"Core",m:"8min",h:1}],
   ex:[
     {n:"Elevação frontal no cabo (bilateral)",tg:["c"],s:"4",r:"12–15",d:"75s",nt:"Substitui temporariamente o desenvolvimento overhead — retira o vetor de carga axial sobre a cervical (C6-C7). Sobe até a altura dos ombros, sem passar da linha. Deltoide anterior coberto sem pressão acima da cabeça."},
     {n:"Elevação lateral no cabo baixo bilateral",tg:[],s:"3",r:"15",d:"60s",nt:"Dois cabos baixos simultâneos — trajetória guiada, mais seguro que haltere. Cotovelo levemente dobrado, sobe até a altura do ombro."},
     {n:"Face pull com corda",tg:[],s:"4",r:"15",d:"60s",nt:"Rotação externa do ombro. Puxe para a testa, não para o queixo. Cobre deltoide posterior e manguito rotador."},
     {n:"Remada alta no cabo",tg:[],s:"3",r:"12–15",d:"60s",nt:"Cotovelos sobem acima dos ombros, punhos relaxados. Deltoide lateral e trapézio médio."},
     {n:"Dead bug + Pallof press alternados",tg:["f","c"],s:"3",r:"10/lado · 12/lado",d:"45s",nt:"Assoalho pélvico e anti-rotação. Base para controle pélvico e performance sexual."}
   ],
   info:"Versão de proteção: desenvolvimento overhead suspenso enquanto a cervical está ativa. Deltoide treinado em 3 ângulos via cabo (frontal, lateral, posterior) sem carga acima da cabeça. Face pull protege o manguito. Reintrodução de pressão overhead a definir com o especialista."},
  {l:"Sex",n:"Posterior",c:"#5a8a7a",
   foc:"Cadeia posterior + estabilização lombar ativa — 2x por semana no core",
   tl:[{t:"Aquec.",m:"4min",h:0},{t:"Leg 90°",m:"13min",h:1},{t:"Flexora",m:"8min",h:1},{t:"Abdução",m:"7min",h:1},{t:"Core lombar",m:"10min",h:1}],
   ex:[
     {n:"Leg press 90° pés altos (pegada fechada)",tg:["p","c"],s:"4",r:"10–12",d:"90s",nt:"Pés altos e próximos na plataforma — recruta glúteo e posterior de coxa. Sem carga lombar. Composto principal do dia."},
     {n:"Flexora deitada bilateral",tg:[],s:"3",r:"12–15",d:"60s",nt:"Isquiotibial — bilateral, sem assimetria. Amplitude total."},
     {n:"Abdução quadril na máquina",tg:["f"],s:"3",r:"15",d:"60s",nt:"Glúteo médio — estabilidade lateral do quadril. Direto na performance sexual e saúde do ciático."},
     {n:"Bird dog",tg:["c"],s:"3",r:"10/lado",d:"45s",nt:"Braço e perna opostos em extensão simultânea. Lombar neutra — não deixe o quadril rotar. O exercício mais eficaz para reabilitar e fortalecer multífidos e extensores lombares."},
     {n:"Prancha lateral",tg:["c"],s:"3",r:"30–40s/lado",d:"30s",nt:"Quadrado lombar e oblíquos — estabilidade lateral que o dead bug não cobre. Corpo alinhado, quadril não cai."}
   ],
   info:"Cadeia posterior pura + core lombar específico. Bird dog e prancha lateral completam o protocolo da quinta — frequência de 2x por semana no core, ângulos complementares."},
  {l:"Sáb",n:"Costas",c:"#4a8fa8",
   foc:"Largura, espessura e bíceps — puxadas, remadas e curl",
   tl:[{t:"Aquec.",m:"3min",h:0},{t:"Puxada",m:"13min",h:1},{t:"Rem. apoiada",m:"11min",h:1},{t:"Polia baixa",m:"9min",h:1},{t:"Rosca direta",m:"8min",h:1},{t:"Rosca martelo",m:"7min",h:1}],
   ex:[
     {n:"Puxada frontal pegada aberta",tg:["p"],s:"4",r:"8–10",d:"90s",nt:"Cotovelos apontam para o chão na descida. Puxe pela escápula, não pelo braço. Pescoço neutro — não projete a cabeça à frente nem puxe atrás da nuca."},
     {n:"Remada na máquina com apoio peitoral",tg:["c"],s:"4",r:"10–12",d:"75s",nt:"Trocada da serrote unilateral por uma remada bilateral com tronco totalmente apoiado — elimina a assimetria e zera a variável lombar e cervical. Carga progressiva aqui."},
     {n:"Remada polia baixa pegada neutra",tg:[],s:"3",r:"12–15",d:"60s",nt:"Espessura do meio das costas. Cotovelos colados ao corpo na chegada."},
     {n:"Rosca direta barra EZ",tg:["p"],s:"3",r:"10–12",d:"75s",nt:"Sem balanço de tronco — isola bíceps com qualidade."},
     {n:"Rosca martelo simultânea",tg:[],s:"3",r:"12",d:"60s",nt:"Braquiorradial e bíceps — volume de braço completo. Simultânea, não alternada."}
   ],
   info:"17 séries totais. Costas recebem 11 séries com variação de ângulo. Bíceps fecha com 6 séries. Sábado fecha a semana sem conflito com nenhum grupo anterior."}
];

var CARD=[
  {l:"Qua",n:"Base + Pico",badge:"Sessão 1",c:"#c07070",
   foc:"Pós-pernas — introdução ao esforço máximo com base aeróbica",
   dur:"11 min",equip:"Bike ou elíptico",obj:"Primeiro contato com zona 5 e treino de recuperação",
   phases:[
     {n:"Fase 1",t:"Aquecimento ativo",dur:"3 min",zona:"Zona 2",int:"Resistência leve",c:"#6a9a6a",note:"60–70% FCmax. Cadência moderada. Respire pelo nariz — ativa o sistema parassimpático antes do esforço."},
     {n:"Fase 2",t:"Intervalos de pico",dur:"5 × (20s esforço / 40s recuperação)",zona:"Zona 5 → Zona 3",int:"Máximo → leve",c:"#c07070",note:"Nos 20s: vá ao máximo. Nos 40s: pedale leve, não pare. Objetivo: sentir o coração acelerar e treinar a descida. 5 repetições."},

  {l:"Qui",n:"Intervalado",badge:"Sessão 2",c:"#c9a05a",

   dur:"12 min",equip:"Bike ou elíptico",obj:"Volume de intervalos — o dia mais importante do protocolo",
   phases:[
     {n:"Fase 1",t:"Aquecimento progressivo",dur:"2 min",zona:"Zona 2–3",int:"Resistência crescente",c:"#c9a05a",note:"Comece leve e aumente gradualmente. Chegue ao final dos 2 min já em Zona 3."},
     {n:"Fase 2",t:"Intervalos principais",dur:"6 × (30s esforço / 30s recuperação)",zona:"Zona 4–5 → Zona 3",int:"Muito alto → moderado",c:"#7a6bbf",note:"Nos 30s de esforço: zona 4–5. Nos 30s de recuperação: zona 3, não caia abaixo. 6 repetições."},

     {n:"Fase 4",t:"Respiração de finalização",dur:"1 min",zona:"—",int:"Parado ou cadência mínima",c:"#5a8a7a",note:"4s inspira · 4s segura · 6s expira. Repete 4 vezes. Parte do treino, não opcional."}

   info:"Sessão mais importante do protocolo. Intervalo 30s/30s em zona 4–5 é o estímulo mais eficiente para recuperação cardiovascular."},

   dur:"12 min",equip:"Bike ou elíptico",obj:"Elevar o limiar anaeróbico — aguentar mais tempo em intensidade alta",
   phases:[
     {n:"Fase 1",t:"Aquecimento",dur:"2 min",zona:"Zona 2",int:"Leve",c:"#6a9a6a",note:"Cadência moderada, resistência baixa."},
     {n:"Fase 2",t:"Bloco de limiar",dur:"6 min contínuos",zona:"Zona 3–4",int:"Moderado-alto sustentado",c:"#c9a05a",note:"6 minutos contínuos em 75–85% FCmax. Sem parar, sem picos."},
     {n:"Fase 3",t:"Recuperação ativa",dur:"2 min",zona:"Zona 2",int:"Leve",c:"#6a9a6a",note:"Pedale leve. Observe a frequência cardíaca descer."},
     {n:"Fase 4",t:"Respiração de finalização",dur:"2 min",zona:"—",int:"Parado ou cadência mínima",c:"#5a8a7a",note:"4s inspira · 4s segura · 6s expira. 6 repetições. Encerra a semana com o sistema nervoso regulado."}
   ],
   info:"Trabalha resistência de limiar — aguentar zona 3–4 por tempo prolongado. Maior correlação com resistência em esforço sexual sustentado."}
];

var TM={p:['ep','◆ principal'],c:['ec2','⚠ coluna'],f:['ef','⚡ perf']};

function getKey(dayIdx,exIdx){return'pg_d'+dayIdx+'_e'+exIdx;}

function salvar(dayIdx,exIdx){
  var inp=document.getElementById('inp_'+dayIdx+'_'+exIdx);
  var lbl=document.getElementById('lbl_'+dayIdx+'_'+exIdx);
  var val=parseFloat(inp.value);
  if(!val||val<=0)return;
  localStorage.setItem(getKey(dayIdx,exIdx),val);
  lbl.innerHTML='Atual: <b>'+val+' kg</b>';
  inp.value='';
  inp.placeholder='kg';
}

function resetChecks(){
  document.querySelectorAll('.chk-btn').forEach(function(b){b.classList.remove('on')});
  document.querySelectorAll('.ec').forEach(function(c){c.classList.remove('done')});
}

function toggleCheck(dayIdx,exIdx){
  var btn=document.getElementById('chk_'+dayIdx+'_'+exIdx);
  var card=document.getElementById('card_'+dayIdx+'_'+exIdx);
  var on=btn.classList.toggle('on');
  if(on){card.classList.add('done');}else{card.classList.remove('done');}
}

function buildMusc(){
  var tabs=document.getElementById('dtabs');
  var panels=document.getElementById('dpanels');
  MUSC.forEach(function(d,i){
    var tb=document.createElement('button');
    tb.className='day-tab'+(i===0?' on':'');
    tb.style.borderBottomColor=i===0?d.c:'transparent';
    tb.style.color=i===0?'var(--tx)':'var(--mt)';
    tb.innerHTML='<span class="dtd">'+d.l+'</span><span class="dtn">'+d.n+'</span>';
    tb.addEventListener('click',function(){
      document.querySelectorAll('#dtabs .day-tab').forEach(function(t){t.classList.remove('on');t.style.borderBottomColor='transparent';t.style.color='var(--mt)'});
      document.querySelectorAll('#dpanels .panel').forEach(function(p){p.classList.remove('on')});
      tb.classList.add('on');tb.style.borderBottomColor=d.c;tb.style.color='var(--tx)';
      document.getElementById('dp'+i).classList.add('on');
      document.querySelector('#v0 .scroll').scrollTop=0;
    });
    tabs.appendChild(tb);

    var pnl=document.createElement('div');
    pnl.className='panel'+(i===0?' on':'');
    pnl.id='dp'+i;

    var tl='<div class="tl">';
    d.tl.forEach(function(s){tl+='<div class="ts'+(s.h?' hi':'')+'">'+s.t+'<div class="tm">'+s.m+'</div></div>';});
    tl+='</div>';

    var ex='';
    d.ex.forEach(function(e,ei){
      var tgs='';
      if(e.tg.length){tgs='<div class="etgs">';e.tg.forEach(function(t){var m=TM[t];tgs+='<span class="etg '+m[0]+'">'+m[1]+'</span>';});tgs+='</div>';}
      var saved=localStorage.getItem(getKey(i,ei));
      var lblHtml=saved?'Atual: <b>'+saved+' kg</b>':'<span style="font-style:italic;color:var(--mt)">Sem registro</span>';
      ex+='<div class="ec" id="card_'+i+'_'+ei+'">'
        +'<div class="ea" style="background:'+d.c+'"></div>'
        +'<div class="ec-top">'
        +'<div class="ec-body">'
        +'<div class="en">Exercício '+(ei+1)+' / '+d.ex.length+'</div>'
        +'<div class="enm">'+e.n+'</div>'+tgs
        +'<div class="ests"><div class="est"><span class="esl">Séries</span><span class="esv">'+e.s+'</span></div>'
        +'<div class="est"><span class="esl">Reps</span><span class="esv sm">'+e.r+'</span></div>'
        +'<div class="est"><span class="esl">Descanso</span><span class="esv">'+e.d+'</span></div></div>'
        +'<div class="enote">'+e.nt+'</div>'
        +'</div>'
        +'<button class="chk-btn" id="chk_'+i+'_'+ei+'" onclick="toggleCheck('+i+','+ei+')" aria-label="Marcar como concluído">'
        +'<svg viewBox="0 0 14 14"><polyline points="2,7 5.5,11 12,3"/></svg>'
        +'</button>'
        +'</div>'
        +'<div class="reg">'
        +'<div class="reg-last" id="lbl_'+i+'_'+ei+'">'+lblHtml+'</div>'
        +'<div class="reg-right">'
        +'<input class="reg-inp" type="number" id="inp_'+i+'_'+ei+'" placeholder="kg" min="0" max="300" step="1" inputmode="decimal"/>'
        +'<span class="reg-unit">kg</span>'
        +'<button class="reg-btn" onclick="salvar('+i+','+ei+')">Salvar</button>'
        +'</div>'
        +'</div>'
        +'</div>';
    });

    pnl.innerHTML='<span class="bdg" style="background:'+d.c+'22;color:'+d.c+'">'+d.n+'</span>'
      +'<div class="ptl">'+d.n+'</div><div class="pfoc">'+d.foc+'</div>'
      +tl+ex
      +'<div class="ibox"><b>Nota:</b> '+d.info+'</div>'
      +'<div class="ftr"><div class="ftrtl">Diretrizes</div><div class="ftr-divider"></div>'
      +'Aquecimento: 3–4 min + 1 série leve (50%) no composto principal.<br>'
      +'Progressão: sobe a carga ao completar todas as reps com técnica limpa por 2 sessões seguidas. Mantenha 1–2 reps na reserva enquanto o quadro estiver em avaliação.<br>'
      +'Cervical: pescoço neutro e sem pressão acima da cabeça enquanto a cervical estiver ativa.<br>'
      +'Lombar: posição neutra sempre; sem flexão lombar carregada até esclarecer o D11-D12.<br>'
      +'Todos os movimentos são bilaterais ou em máquina, com tronco apoiado.</div>';
    panels.appendChild(pnl);
  });
}

function buildCard(){
  var tabs=document.getElementById('ctabs');
  var panels=document.getElementById('cpanels');
  var header=document.createElement('div');
  header.style.padding='16px 20px 0';
  header.innerHTML='<div class="ibox" style="margin-top:0"><b>Protocolo:</b> Anexado ao final do treino de Qua, Qui e Sex. Bike ergométrica ou elíptico. 10–12 minutos por sessão. Pescoço neutro durante o esforço — sem projetar a cabeça à frente.</div>'
    +'<div class="slbl">Zonas de frequência cardíaca</div>'
    +'<div class="hz-bar">'
    +'<div class="hz-row"><div class="hz-dot" style="background:#6a9a6a"></div><span class="hz-lbl">Zona 2 — base aeróbica</span><span class="hz-bpm">60–70% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#c9a05a"></div><span class="hz-lbl">Zona 3 — limiar aeróbico</span><span class="hz-bpm">70–80% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#c07070"></div><span class="hz-lbl">Zona 4 — limiar anaeróbico</span><span class="hz-bpm">80–90% FCmax</span></div>'
    +'<div class="hz-row"><div class="hz-dot" style="background:#7a6bbf"></div><span class="hz-lbl">Zona 5 — pico máximo</span><span class="hz-bpm">90–100% FCmax</span></div>'
    +'</div>'
    +'<div style="font-size:10px;color:var(--mt);margin-bottom:12px">FCmax estimada = 220 − sua idade.</div>'
    +'<div class="slbl">Progressão semanal</div>'
    +'<div class="pgc"><b>Semanas 1–2:</b> Execute exatamente como descrito. Aprenda o ritmo dos intervalos e respeite as zonas.</div>'
    +'<div class="pgc"><b>Semanas 3–4:</b> Aumente a resistência da bike/elíptico 1 nível nos blocos de esforço. Mantenha os tempos.</div>'
    +'<div class="pgc"><b>Semanas 5–6:</b> Adicione 1 repetição extra nos intervalos de cada sessão.</div>'
    +'<div class="pgc"><b>Semana 7+:</b> Se a recuperação já acontece abaixo de 130bpm, aumente a intensidade dos picos.</div>';
  panels.appendChild(header);
  CARD.forEach(function(d,i){
    var tb=document.createElement('button');
    tb.className='day-tab'+(i===0?' on':'');
    tb.style.borderBottomColor=i===0?d.c:'transparent';
    tb.style.color=i===0?'var(--tx)':'var(--mt)';
    tb.innerHTML='<span class="dtd">'+d.l+'</span><span class="dtn">'+d.n+'</span>';
    tb.addEventListener('click',function(){
      document.querySelectorAll('#ctabs .day-tab').forEach(function(t){t.classList.remove('on');t.style.borderBottomColor='transparent';t.style.color='var(--mt)'});
      document.querySelectorAll('#cpanels .panel').forEach(function(p){p.classList.remove('on')});
      tb.classList.add('on');tb.style.borderBottomColor=d.c;tb.style.color='var(--tx)';
      document.getElementById('cp'+i).classList.add('on');
      document.querySelector('#v1 .scroll').scrollTop=0;
    });
    tabs.appendChild(tb);
    var pnl=document.createElement('div');
    pnl.className='panel'+(i===0?' on':'');
    pnl.id='cp'+i;
    var meta='<div class="meta">'
      +'<div class="mc"><div class="ml">Duração</div><div class="mv">'+d.dur+'</div></div>'
      +'<div class="mc"><div class="ml">Equipamento</div><div class="mv">'+d.equip+'</div></div>'
      +'</div>'
      +'<div class="ibox"><b>Objetivo:</b> '+d.obj+'</div>';
    var phases='<div class="slbl">Estrutura da sessão</div>';
    d.phases.forEach(function(p){
      phases+='<div class="pc"><div class="pa" style="background:'+p.c+'"></div>'
        +'<div class="pn">'+p.n+'</div><div class="pt">'+p.t+'</div>'
        +'<div class="psts">'
        +'<div class="pst"><span class="psl">Duração</span><span class="psv">'+p.dur+'</span></div>'
        +'<div class="pst"><span class="psl">Zona</span><span class="psv">'+p.zona+'</span></div>'
        +'<div class="pst"><span class="psl">Intensidade</span><span class="psv">'+p.int+'</span></div>'
        +'</div>'
        +'<div class="pnote">'+p.note+'</div></div>';
    });
    pnl.innerHTML='<span class="bdg" style="background:'+d.c+'22;color:'+d.c+'">'+d.badge+'</span>'
      +'<div class="ptl">'+d.n+'</div><div class="pfoc">'+d.foc+'</div>'
      +meta+phases
      +'<div class="ibox"><b>Nota:</b> '+d.info+'</div>';
    panels.appendChild(pnl);
  });
}

buildMusc();
buildCard();
</script>
</body>
</html>
